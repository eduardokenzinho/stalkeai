<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 753 565" role="img" aria-labelledby="title desc">
  <title id="title">Light generic map</title>
  <desc id="desc">A soft generic map with pale streets and neutral city blocks.</desc>
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="2" seed="9"/>
      <feColorMatrix type="saturate" values=".12"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .05"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="softFade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f8f8"/>
      <stop offset=".55" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#eef4f9"/>
    </linearGradient>
    <linearGradient id="parkGlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f4f6ed" stop-opacity="0"/>
      <stop offset=".62" stop-color="#bdffd5" stop-opacity=".75"/>
      <stop offset="1" stop-color="#dff4e7" stop-opacity=".1"/>
    </linearGradient>
  </defs>
  <rect width="753" height="565" fill="url(#softFade)"/>
  <rect width="753" height="565" filter="url(#paper)" opacity=".8"/>

